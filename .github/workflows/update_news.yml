name: Update News

on:
  schedule:
    - cron: '0 23 * * *'   # UTC 23:00 = JST 08:00
  workflow_dispatch:         # 手動実行ボタンを有効化

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news update script
        run: python scripts/main.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Gitの「無視されたファイル」に関する警告を抑制
          git config set advice.addIgnoredFile false
          # エラーの原因だった cache/cache.json を除外。docsの中身だけをaddする
          git add docs/
          git diff --staged --quiet || git commit -m "chore: update news $(date +'%Y-%m-%d')"
          git push